version: "3.9"

services:
  # ─── MariaDB ──────────────────────────────────────────────────────────────
  db:
    image: mariadb:11.3
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: auth_db
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: 8080
      DB_DSN: appuser:apppassword@tcp(db:3306)/auth_db?parseTime=true&charset=utf8mb4&loc=UTC
      JWT_SECRET: change-me-in-production-use-a-long-random-secret
      JWT_ISSUER: go-auth-boilerplate
      JWT_AUDIENCE: go-auth-boilerplate-users
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
