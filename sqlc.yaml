version: "2"
sql:
  - engine: "mysql"
    queries: "./sql/queries"
    schema: "./sql/migrations"
    gen:
      go:
        package: "db"
        out: "./internal/db"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_exported_queries: false
        json_tags_case_style: "snake"
        overrides:
          - db_type: "boolean"
            go_type: "bool"
          - db_type: "datetime"
            go_type: "time.Time"
          - column: "*.metadata"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
