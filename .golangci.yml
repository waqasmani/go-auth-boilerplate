version: "2"
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/yourusername/go-auth-boilerplate

issues:
  exclude-rules:
    - path: _test.go
      linters: [errcheck]
    - path: internal/db/
      linters: [revive, unused]
