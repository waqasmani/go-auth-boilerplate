version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - gocritic
    - bodyclose
    - misspell

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/waqasmani/go-auth-boilerplate

issues:
  exclude-rules:
    - path: _test.go
      linters:
        - errcheck
    - path: internal/db/
      linters:
        - unused